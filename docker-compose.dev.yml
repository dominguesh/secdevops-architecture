# webapp-1 local development (Postgres user/db: webapp1 — use webapp2 for a second stack, etc.)
#
# Default stack (app + DB on the internal Docker network):
#   docker compose -f docker-compose.dev.yml up -d
#
# Optional Linux SSH/tools container (heavier — enable when needed):
#   docker compose -f docker-compose.dev.yml --profile tools up -d
#
# Optional: expose Postgres on localhost:5432 for GUI clients (DBeaver, etc.):
#   docker compose -f docker-compose.dev.yml -f docker-compose.dev.db-host.yml up -d

services:
  dev-workstation:
    container_name: dev-workstation
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "2222:22"
    volumes:
      - .:/workspace
      # Linux / WSL: uncomment to drive the host Docker daemon from inside this container
      # - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - webapp1_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - webapp1_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: webapp1
      POSTGRES_PASSWORD: webapp1
      POSTGRES_DB: webapp1
      DATABASE_URL: postgresql://webapp1:webapp1@db:5432/webapp1
    networks:
      - webapp1_network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webapp1
      POSTGRES_PASSWORD: webapp1
      POSTGRES_DB: webapp1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webapp1_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webapp1 -d webapp1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  webapp1_network:
    driver: bridge
